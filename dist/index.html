<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REST Countries API</title>
    <script defer type="module" src="./index.js"></script>
</head>

<body>
    <header>
        <h1>REST Countries</h1>
    </header>
    <main>
        <section>
            <form>
                <label for="txtSearch">Search:</label>
                <input id="txtSearch" type="text" placeholder="Search for a country..." />
                <select id="ddlRegions">
                    <option value="">Filter by Region</option>
                    <option value="Africa">Africa</option>
                    <option value="Americas">Americas</option>
                    <option value="Asia">Asia</option>
                    <option value="Europe">Europe</option>
                    <option value="Oceania">Oceania</option>
                </select>
            </form>
        </section>

        <section id="countries-card-container"></section>

        <template id="country-card-template">

            <article class="country-card">
                <img class="country-card-flag" src="" alt="" />
                <div class="country-card-content">
                    <h2 class="country-card-name"></h2>
                    <p><strong>Population:</strong> <span class="country-card-population"></span></p>
                    <p><strong>Region:</strong> <span class="country-card-region"></span></p>
                    <p><strong>Capital:</strong> <span class="country-card-capital"></span></p>
                </div>
            </article>

        </template>

    </main>
</body>

</html>
